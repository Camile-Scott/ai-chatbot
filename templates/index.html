<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>我的AI聊天机器人</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    #chat-box { height: 400px; border: 1px solid #ccc; border-radius: 8px; overflow-y: auto; padding: 16px; margin-bottom: 16px; }
    .user { text-align: right; margin: 8px 0; }
    .user span { background: #0084ff; color: white; padding: 8px 14px; border-radius: 16px; display: inline-block; }
    .ai { text-align: left; margin: 8px 0; }
    .ai span { background: #f0f0f0; padding: 8px 14px; border-radius: 16px; display: inline-block; }
    #input-area { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
  </style>
</head>
<body>
  <h2>我的AI聊天机器人</h2>
  <div id="chat-box"></div>
  <div id="input-area">
    <input id="user-input" type="text" placeholder="输入消息..." />
    <button onclick="sendMessage()">发送</button>
  </div>
  <script>
    async function sendMessage() {
      const input = document.getElementById("user-input");
      const msg = input.value.trim();
      if (!msg) return;
      
      const box = document.getElementById("chat-box");
      box.innerHTML += `<div class="user"><span>${msg}</span></div>`;
      input.value = "";
      
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      box.innerHTML += `<div class="ai"><span>${data.reply}</span></div>`;
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
