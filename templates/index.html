<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>我的AI助手</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; height: 100vh; display: flex; background: #fff; }

    /* 左侧边栏 - 固定 */
    #sidebar { 
      width: 260px; 
      background: #f5f5f5; 
      border-right: 1px solid #e0e0e0; 
      display: flex; 
      flex-direction: column; 
      padding: 16px 12px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }

    #new-chat-btn { 
      padding: 12px 16px; 
      background: #0084ff; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      margin-bottom: 16px; 
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    #new-chat-btn:hover { background: #0073e6; }

    #conversation-list { 
      flex: 1; 
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .conv-item { 
      padding: 12px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 14px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      min-width: 0;
      transition: background 0.2s;
    }

    .conv-item:hover { background: #e8e8e8; }
    .conv-item.active { background: #dbeafe; color: #0084ff; font-weight: 500; }

    .conv-title { 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      flex: 1; 
      min-width: 0;
    }

    .conv-delete { 
      color: #999; 
      font-size: 13px; 
      padding: 4px 6px; 
      border-radius: 4px; 
      flex-shrink: 0; 
      margin-left: 4px;
      cursor: pointer;
    }

    .conv-delete:hover { color: #ff4d4f; background: #fafafa; }

    /* 主区域 */
    #main { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      margin-left: 260px;
      background: #fff;
    }

    header { 
      padding: 16px 24px; 
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 { 
      font-size: 20px; 
      font-weight: 600;
      margin-bottom: 12px;
    }

    .tabs { 
      display: flex; 
      gap: 8px; 
    }

    .tab { 
      padding: 8px 16px; 
      border-radius: 20px; 
      cursor: pointer; 
      border: 1px solid #ddd; 
      font-size: 14px; 
      background: white;
      transition: all 0.2s;
    }

    .tab:hover { border-color: #0084ff; color: #0084ff; }
    .tab.active { 
      background: #0084ff; 
      color: white; 
      border-color: #0084ff; 
    }

    .panel { 
      display: none; 
      flex: 1; 
      flex-direction: column; 
      padding: 16px 24px;
      overflow: hidden;
    }

    .panel.active { display: flex; }

    #chat-box, #pdf-box { 
      flex: 1; 
      border: 1px solid #e0e0e0; 
      border-radius: 8px; 
      overflow-y: auto; 
      padding: 16px; 
      margin-bottom: 16px;
      background: #fafafa;
    }

    .user { 
      text-align: right; 
      margin: 8px 0; 
    }

    .user span { 
      background: #0084ff; 
      color: white; 
      padding: 8px 14px; 
      border-radius: 16px; 
      display: inline-block; 
      max-width: 80%;
      word-wrap: break-word;
    }

    .ai { 
      text-align: left; 
      margin: 8px 0; 
    }

    .ai span { 
      background: #e8e8e8; 
      padding: 8px 14px; 
      border-radius: 16px; 
      display: inline-block; 
      max-width: 80%; 
      line-height: 1.6;
      word-wrap: break-word;
    }

    .ai span h1, .ai span h2, .ai span h3 { 
      margin: 8px 0 4px; 
      font-size: 1em;
    }

    .ai span p { margin: 4px 0; }

    .ai span ul, .ai span ol { 
      margin: 4px 0 4px 20px; 
    }

    .typing-hourglass { 
      font-size: 20px; 
      display: inline-block; 
      animation: flip 1s steps(1) infinite; 
    }

    @keyframes flip { 
      0%, 100% { opacity: 1; } 
      50% { opacity: 0.3; } 
    }

    .input-area { 
      display: flex; 
      gap: 8px;
      background: #fff;
    }

    .input-area input { 
      flex: 1; 
      padding: 12px 14px; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      outline: none;
      border-color: #0084ff;
      box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.1);
    }

    .input-area button { 
      padding: 12px 24px; 
      background: #0084ff; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #0073e6; }

    #upload-area { 
      border: 2px dashed #ddd; 
      border-radius: 8px; 
      padding: 24px; 
      text-align: center; 
      margin-bottom: 16px;
      background: #fafafa;
    }

    #upload-area p { 
      margin-bottom: 12px; 
      color: #666; 
      font-size: 14px; 
    }

    #upload-area input { 
      margin: 12px 0;
    }

    #pdf-status { 
      font-size: 13px; 
      color: #4caf50; 
      margin-bottom: 12px;
    }

    #pdf-ask { 
      display: none; 
      flex: 1; 
      flex-direction: column; 
    }

    /* 滚动条美化 */
    #chat-box::-webkit-scrollbar,
    #pdf-box::-webkit-scrollbar,
    #conversation-list::-webkit-scrollbar {
      width: 6px;
    }

    #chat-box::-webkit-scrollbar-track,
    #pdf-box::-webkit-scrollbar-track,
    #conversation-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-box::-webkit-scrollbar-thumb,
    #pdf-box::-webkit-scrollbar-thumb,
    #conversation-list::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    #chat-box::-webkit-scrollbar-thumb:hover,
    #pdf-box::-webkit-scrollbar-thumb:hover,
    #conversation-list::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <button id="new-chat-btn" onclick="newConversation()">+ 新建对话</button>
    <div id="conversation-list"></div>
  </div>

  <div id="main">
    <header>
      <h1>我的AI助手</h1>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('chat', this)">💬 聊天</button>
        <button class="tab" onclick="switchTab('pdf', this)">📄 文档问答</button>
      </div>
    </header>

    <div class="panel active" id="panel-chat">
      <div id="chat-box"></div>
      <div class="input-area">
        <input id="chat-input" type="text" placeholder="输入消息..." />
        <button onclick="sendMessage()">发送</button>
      </div>
    </div>

    <div class="panel" id="panel-pdf">
      <div id="upload-area">
        <p>上传文件后向AI提问(支持PDF、Word、PPT,可同时选多个)</p>
        <input type="file" id="pdf-file" accept=".pdf,.docx,.pptx" multiple onchange="uploadPDF()" />
      </div>
      <div id="pdf-status"></div>
      <div id="pdf-ask">
        <div id="pdf-box"></div>
        <div class="input-area">
          <input id="pdf-input" type="text" placeholder="问文档里的内容..." />
          <button onclick="askQuestion()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentConversationId = null;

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    async function loadConversations() {
      const res = await fetch("/conversations");
      const data = await res.json();
      const list = document.getElementById("conversation-list");
      list.innerHTML = "";

      if (data.length === 0) {
        await newConversation();
        return;
      }

      data.forEach(conv => {
        const div = document.createElement("div");
        div.className = "conv-item" + (conv.id === currentConversationId ? " active" : "");

        const titleSpan = document.createElement("span");
        titleSpan.className = "conv-title";
        titleSpan.textContent = conv.title;
        titleSpan.onclick = () => switchConversation(conv.id);

        const delSpan = document.createElement("span");
        delSpan.className = "conv-delete";
        delSpan.textContent = "×";
        delSpan.onclick = (e) => deleteConversation(conv.id, e);

        div.appendChild(titleSpan);
        div.appendChild(delSpan);
        list.appendChild(div);
      });

      if (currentConversationId === null) {
        switchConversation(data[0].id);
      }
    }

    async function newConversation() {
      const res = await fetch("/conversations", { method: "POST" });
      const data = await res.json();
      currentConversationId = data.id;
      document.getElementById("chat-box").innerHTML = "";
      await loadConversations();
    }

    async function deleteConversation(id, event) {
      event.stopPropagation();
      if (!confirm("确定删除这个对话吗？")) return;

      await fetch("/conversations/" + id, { method: "DELETE" });

      if (id === currentConversationId) {
        currentConversationId = null;
      }
      await loadConversations();
    }

    async function switchConversation(id) {
      currentConversationId = id;
      await loadConversations();
      await loadHistory();
    }

    async function loadHistory() {
      const res = await fetch("/history?conversation_id=" + currentConversationId);
      const data = await res.json();
      const box = document.getElementById("chat-box");
      box.innerHTML = "";
      data.forEach(msg => {
        if (msg.role === "user") {
          box.innerHTML += `<div class="user"><span>${msg.content}</span></div>`;
        } else if (msg.role === "assistant") {
          box.innerHTML += `<div class="ai"><span>${marked.parse(msg.content)}</span></div>`;
        }
      });
      box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const msg = input.value.trim();
      if (!msg) return;
      const box = document.getElementById("chat-box");
      box.innerHTML += `<div class="user"><span>${msg}</span></div>`;
      input.value = "";

      const typing = document.createElement("div");
      typing.className = "ai";
      typing.id = "typing";
      typing.innerHTML = `<span class="typing-hourglass">⏳</span>`;
      box.appendChild(typing);
      box.scrollTop = box.scrollHeight;

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, conversation_id: currentConversationId })
      });
      const data = await res.json();

      document.getElementById("typing")?.remove();
      box.innerHTML += `<div class="ai"><span>${marked.parse(data.reply)}</span></div>`;
      box.scrollTop = box.scrollHeight;

      loadConversations();
    }

    async function uploadPDF() {
      const files = document.getElementById("pdf-file").files;
      if (files.length === 0) return;
      document.getElementById("pdf-status").textContent = "上传中...";
      for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("conversation_id", currentConversationId);
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        document.getElementById("pdf-status").textContent = data.message;
      }
      document.getElementById("pdf-ask").style.display = "flex";
    }

    async function askQuestion() {
      const input = document.getElementById("pdf-input");
      const question = input.value.trim();
      if (!question) return;
      const box = document.getElementById("pdf-box");
      box.innerHTML += `<div class="user"><span>${question}</span></div>`;
      input.value = "";

      const typing = document.createElement("div");
      typing.className = "ai";
      typing.id = "typing-pdf";
      typing.innerHTML = `<span class="typing-hourglass">⏳</span>`;
      box.appendChild(typing);
      box.scrollTop = box.scrollHeight;

      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, conversation_id: currentConversationId })
      });
      const data = await res.json();

      document.getElementById("typing-pdf")?.remove();
      box.innerHTML += `<div class="ai"><span>${marked.parse(data.answer)}</span></div>`;
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById("chat-input").addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
    document.getElementById("pdf-input").addEventListener("keydown", e => { if (e.key === "Enter") askQuestion(); });

    loadConversations();
  </script>
</body>
</html>
